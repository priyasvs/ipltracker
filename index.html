<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>IPL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --or:#F97316;--dark:#0F172A;--card:#1E293B;--card2:#273548;
  --border:#334155;--text:#F1F5F9;--muted:#94A3B8;
  --green:#22C55E;--green-bg:rgba(34,197,94,.1);
  --red:#EF4444;--red-bg:rgba(239,68,68,.08);
  --yellow:#EAB308;
  --fh:'Teko',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:var(--fb);overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--dark);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;overflow-y:auto}
.logo{font-family:var(--fh);font-size:48px;font-weight:700;color:var(--or);line-height:1;text-align:center}
#step1{width:100%;max-width:340px}
#step1 .hint{font-size:13px;color:var(--muted);text-align:center;margin-bottom:12px}
#player-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.player-btn{padding:12px 8px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px}
.player-btn:active{opacity:.7}
.p-av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
#step2{width:100%;max-width:340px;display:none;flex-direction:column;align-items:center;gap:12px}
.back-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;align-self:flex-start}
#login-name{font-family:var(--fh);font-size:24px;font-weight:700}
.pin-hint{font-size:13px;color:var(--muted)}
.dots{display:flex;gap:14px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.dot.on{background:var(--or);border-color:var(--or)}
#pin-err{font-size:12px;color:var(--red);min-height:16px;text-align:center}
#pin-debug{font-size:10px;color:var(--muted);text-align:center}
.numpad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.num-btn{height:72px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--fh);font-size:28px;font-weight:600;cursor:pointer}
.num-btn:active{opacity:.7}
.first-time{font-size:11px;color:var(--muted);text-align:center}

/* ── TOPBAR ── */
.topbar{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-title{font-family:var(--fh);font-size:28px;font-weight:700;line-height:1}
.top-title span{color:var(--or)}
.top-right{display:flex;gap:6px;align-items:center}
.user-badge{font-size:11px;font-weight:700;padding:5px 8px;border-radius:8px;background:var(--card2);border:1px solid var(--border);cursor:pointer;color:var(--or)}
.sync-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
.sync-btn.syncing{color:var(--yellow)}
.sync-btn.ok{color:var(--green)}
.sync-btn.err{color:var(--red)}

/* ── TABS ── */
.tabs{display:flex;padding:0 16px 8px;gap:6px;flex-shrink:0}
.tab{flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:10px;font-family:var(--fb);font-size:11px;font-weight:600;cursor:pointer;background:var(--card2);color:var(--muted)}
.tab.active{background:var(--or);color:#fff;border-color:var(--or)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:0 16px 80px;-webkit-overflow-scrolling:touch}
.section{display:none}.section.active{display:block}

/* ── MATCH CARD ── */
.mcard{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 8px}
.mdate{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mtime{font-size:10px;color:var(--muted);padding:0 14px 6px}
.mbadge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700}
.b-up{background:rgba(59,130,246,.15);color:#60A5FA}
.b-done{background:rgba(34,197,94,.15);color:var(--green)}
.b-locked{background:rgba(239,68,68,.15);color:var(--red)}
.teams-row{display:flex;align-items:center;gap:8px;padding:0 14px 8px}
.tchip{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;align-items:center;gap:8px}
.tchip.won{border-color:var(--green);background:var(--green-bg)}
.tdot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}
.tname{font-size:12px;font-weight:600}
.vs{font-family:var(--fh);font-size:14px;color:var(--muted);flex-shrink:0}
.mvenue{font-size:10px;color:var(--muted);padding:0 14px 8px}
.picks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 14px 10px}
.pcell{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 6px;text-align:center}
.pcell.cor{border-color:var(--green);background:var(--green-bg)}
.pcell.wrg{border-color:var(--red);background:var(--red-bg)}
.pname{font-size:9px;color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pteam{font-size:11px;font-weight:700}
.pres{font-size:10px;font-weight:700;margin-top:1px}
.pres.pos{color:var(--green)}.pres.neg{color:var(--red)}
.mactions{display:flex;gap:8px;padding:0 14px 12px;align-items:center}
.btn-sm{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer}
.btn-sm:active{opacity:.7}
.btn-pri{background:var(--or);border-color:var(--or);color:#fff}
.lock-warn{font-size:10px;color:var(--yellow);font-weight:600;margin-left:2px}
.pts-wrap{margin-left:auto;display:flex;align-items:center;gap:5px}
.pts-lbl{font-size:11px;color:var(--muted)}
.pts-inp{width:50px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;font-weight:700;text-align:center;font-family:var(--fb)}

/* ── LEADERBOARD ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.stat-val{font-family:var(--fh);font-size:32px;font-weight:700;color:var(--or);line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.lb-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px}
.lb-rank{font-family:var(--fh);font-size:24px;font-weight:700;width:28px;text-align:center;color:var(--muted)}
.lb-rank.g{color:#F59E0B}.lb-rank.s{color:#CBD5E1}.lb-rank.b{color:#CD7C3A}
.lb-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.lb-name{flex:1;font-weight:600;font-size:14px}
.lb-right{text-align:right}
.lb-amt{font-family:var(--fh);font-size:22px;font-weight:700;line-height:1}
.lb-amt.pos{color:var(--green)}.lb-amt.neg{color:var(--red)}.lb-amt.zero{color:var(--muted)}
.lb-det{font-size:10px;color:var(--muted);margin-top:2px}

/* ── SCOREBOARD ── */
.sb-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}

/* ── TEAMS ── */
.team-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.team-hdr{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;user-select:none}
.team-hdr:active{opacity:.7}
.team-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.team-info{flex:1}
.team-name{font-family:var(--fh);font-size:20px;font-weight:700;line-height:1}
.team-sub{font-size:11px;color:var(--muted);margin-top:2px}
.team-chevron{font-size:20px;color:var(--muted);transition:transform .2s}
.team-chevron.open{transform:rotate(90deg)}
.squad-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.squad-group-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px}
.player-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.player-row:last-child{border:none}
.p-init{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0}
.p-details{flex:1}
.p-nm{font-size:13px;font-weight:600}
.p-country{font-size:10px;color:var(--muted)}
.p-role{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}

/* ── SETTINGS ── */
.set-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px}
.set-title{font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:10px}
.inp{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:10px;background:var(--card2);color:var(--text);font-size:13px;font-family:var(--fb)}
.inp:focus{outline:none;border-color:var(--or)}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;font-weight:500}
.set-hint{font-size:11px;color:var(--muted);margin-top:6px}
.player-row-set{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:6px}
.btn-danger{background:rgba(239,68,68,.15);border:none;color:var(--red);border-radius:8px;padding:5px 8px;font-size:12px;font-weight:600;cursor:pointer}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--dark);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h3{font-family:var(--fh);font-size:24px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.pick-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.pick-row:last-of-type{border:none}
.pick-name{font-size:13px;font-weight:600;width:88px;flex-shrink:0}
.pick-btns{display:flex;gap:6px;flex:1}
.tbtn{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;text-align:center}
.tbtn.sel{color:#fff;border-color:transparent}
.readonly-pick{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.readonly-pick:last-child{border:none}
.ro-name{font-size:13px;font-weight:600;width:88px;flex-shrink:0}
.ro-chip{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;color:#fff}
.ro-none{font-size:12px;color:var(--muted)}
.section-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
.mactions-modal{display:flex;gap:8px;margin-top:16px}
.mbtn{flex:1;padding:13px;border-radius:12px;border:none;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer}
.mbtn-cancel{background:var(--card2);color:var(--muted)}
.mbtn-save{background:linear-gradient(135deg,var(--or),#FB923C);color:#fff}
.mbtn:active{opacity:.8}
.win-opts{display:flex;gap:10px;margin:12px 0}
.win-opt{flex:1;padding:14px 8px;border-radius:12px;border:2px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.win-opt.sel{border-color:var(--green);background:var(--green-bg);color:var(--green)}

/* ── CFG SCREEN ── */
#cfg{position:fixed;inset:0;background:var(--dark);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.cfg-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:400px}
.cfg-title{font-family:var(--fh);font-size:22px;color:var(--or);margin-bottom:12px}
.cfg-hint{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.btn-cfg{width:100%;padding:12px;background:linear-gradient(135deg,var(--or),#FB923C);color:#fff;border:none;border-radius:10px;font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;white-space:nowrap;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px 24px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="logo">🏏<br>IPL <span style="color:#94A3B8;font-size:32px">2026</span></div>
  <div id="step1">
    <div class="hint">Who are you?</div>
    <div id="player-grid"></div>
  </div>
  <div id="step2">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div id="login-name" style="font-family:var(--fh);font-size:24px;font-weight:700"></div>
    <div class="pin-hint">Enter last 4 digits of your phone</div>
    <div class="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div id="pin-err"></div>
    <div id="pin-debug"></div>
    <div class="numpad">
      <button class="num-btn" onclick="numPress(1)">1</button>
      <button class="num-btn" onclick="numPress(2)">2</button>
      <button class="num-btn" onclick="numPress(3)">3</button>
      <button class="num-btn" onclick="numPress(4)">4</button>
      <button class="num-btn" onclick="numPress(5)">5</button>
      <button class="num-btn" onclick="numPress(6)">6</button>
      <button class="num-btn" onclick="numPress(7)">7</button>
      <button class="num-btn" onclick="numPress(8)">8</button>
      <button class="num-btn" onclick="numPress(9)">9</button>
      <div></div>
      <button class="num-btn" onclick="numPress(0)">0</button>
      <button class="num-btn" style="font-size:20px" onclick="numDel()">⌫</button>
    </div>
    <div class="first-time">First time? Ask PK or Priya to set your PIN</div>
  </div>
</div>

<!-- CFG -->
<div id="cfg">
  <div style="font-family:var(--fh);font-size:48px;color:var(--or);text-align:center">🏏<br>IPL 2026</div>
  <div class="cfg-card">
    <div class="cfg-title">Connect Google Sheet</div>
    <p class="cfg-hint">Paste your Apps Script Web App URL below</p>
    <input class="inp" id="sheet-url" type="url" placeholder="https://script.google.com/macros/s/..." style="margin-bottom:10px">
    <button class="btn-cfg" onclick="saveConfig()">Connect →</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="top-title">IPL <span>2026</span></div>
    <div class="top-right">
      <div id="user-badge" class="user-badge" onclick="logout()"></div>
      <button id="sync-btn" class="sync-btn" onclick="doSync()">↻ Sync</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('matches')">Matches</button>
    <button class="tab" onclick="showTab('scores')">Scores</button>
    <button class="tab" onclick="showTab('board')">🏆</button>
    <button class="tab" onclick="showTab('teams')">Teams</button>
    <button class="tab" onclick="showTab('settings')">⚙</button>
  </div>
  <div class="content">
    <div id="tab-matches" class="section active"></div>
    <div id="tab-scores" class="section"></div>
    <div id="tab-board" class="section"></div>
    <div id="tab-teams" class="section"></div>
    <div id="tab-settings" class="section"></div>
  </div>
</div>

<!-- PICKS MODAL -->
<div class="modal-bg" id="picks-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="pm-title"></h3>
    <div class="modal-sub" id="pm-sub"></div>
    <div id="pm-body"></div>
    <div class="mactions-modal">
      <button class="mbtn mbtn-cancel" onclick="closeModal('picks-modal')">Cancel</button>
      <button class="mbtn mbtn-save" onclick="savePicks()">Save</button>
    </div>
  </div>
</div>

<!-- WIN MODAL -->
<div class="modal-bg" id="win-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Set Winner</h3>
    <div class="modal-sub" id="wm-sub"></div>
    <div class="win-opts" id="wm-opts"></div>
    <div class="mactions-modal">
      <button class="mbtn mbtn-cancel" onclick="closeModal('win-modal')">Cancel</button>
      <button class="mbtn mbtn-save" onclick="saveWinner()">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SU_KEY      = 'ipl26_sheet';
const PLAYERS_KEY = 'ipl26_players';
const PTS_KEY     = 'ipl26_pts';
const ADMIN_KEY   = 'ipl26_admin_pin';
const ADMINS      = ['PK','Priya'];

const DEF_PLAYERS = ['Amit S','PK','Raj','Shantanu','Vishal','Shantanu C','Paji','Sushmit','Rahul','Akhil','Pank','Priya'];
const COLORS      = ['#E85D24','#1D9E75','#534AB7','#185FA5','#D4537E','#B07D20','#0F6E56','#993C1D','#4338CA','#0E7490','#7C3AED','#DB2777','#0891B2','#65A30D','#9333EA','#EA580C'];

const TEAMS = [
  {id:'MI',  name:'Mumbai Indians',              color:'#005DA0'},
  {id:'CSK', name:'Chennai Super Kings',         color:'#FDB913'},
  {id:'RCB', name:'Royal Challengers Bengaluru', color:'#D41B2C'},
  {id:'KKR', name:'Kolkata Knight Riders',       color:'#3A225D'},
  {id:'DC',  name:'Delhi Capitals',              color:'#0078BC'},
  {id:'SRH', name:'Sunrisers Hyderabad',         color:'#F7A721'},
  {id:'PBKS',name:'Punjab Kings',                color:'#ED1B24'},
  {id:'RR',  name:'Rajasthan Royals',            color:'#254AA5'},
  {id:'GT',  name:'Gujarat Titans',              color:'#1C3B6B'},
  {id:'LSG', name:'Lucknow Super Giants',        color:'#A72B2A'},
];

// IPL 2026 — confirmed first 20 matches. kickoffUTC = GMT times from official schedule
const SCHEDULE = [
  {id:'m1', date:'28-Mar',t1:'RCB', t2:'SRH', venue:'M.Chinnaswamy, Bengaluru',   kickoffUTC:'2026-03-28T14:00:00Z'},
  {id:'m2', date:'29-Mar',t1:'MI',  t2:'KKR', venue:'Wankhede, Mumbai',           kickoffUTC:'2026-03-29T14:00:00Z'},
  {id:'m3', date:'30-Mar',t1:'RR',  t2:'CSK', venue:'Barsapara, Guwahati',        kickoffUTC:'2026-03-30T14:00:00Z'},
  {id:'m4', date:'31-Mar',t1:'PBKS',t2:'GT',  venue:'Mullanpur, Chandigarh',      kickoffUTC:'2026-03-31T14:00:00Z'},
  {id:'m5', date:'1-Apr', t1:'LSG', t2:'DC',  venue:'Ekana, Lucknow',             kickoffUTC:'2026-04-01T14:00:00Z'},

function savePlayers(){ localStorage.setItem(PLAYERS_KEY, JSON.stringify(PLAYERS)); }
function getPts(mid){ return matchPts[mid] || 10; }
function setPts(mid,v){ matchPts[mid]=v; localStorage.setItem(PTS_KEY,JSON.stringify(matchPts)); }
function teamById(id){ return TEAMS.find(t=>t.id===id)||{id,name:id,color:'#64748B'}; }
function av(n){ return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function norm(s){ return String(s).toLowerCase().replace(/[^a-z0-9]/g,''); }

function kickoff(m){
  if(m.kickoffUTC) return new Date(m.kickoffUTC);
  return null;
}
function minsToKickoff(m){
  const k=kickoff(m); if(!k) return 9999;
  return (k-new Date())/60000;
}
function isLocked(mid){
  if(isAdmin()) return false;
  const m=SCHEDULE.find(x=>x.id===mid);
  if(!m) return false;
  const row=getRow(mid);
  if(row?.winner) return true;
  return minsToKickoff(m) <= 30;
}
function lockLabel(m){
  const mins=minsToKickoff(m);
  if(mins<=0) return '🔒 Started';
  if(mins<=30) return `🔒 Locks in ${Math.ceil(mins)}m`;
  if(mins<=60) return `⏰ ${Math.ceil(mins)}m to lock`;
  return '';
}
function localTime(m){
  const k=kickoff(m); if(!k) return '';
  return k.toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});
}
function isAdmin(){ return currentUser?.isAdmin===true; }
function getRow(mid){
  const m=SCHEDULE.find(x=>x.id===mid);
  if(!m) return null;
  return sheetData.find(r=>r.id===mid) ||
         sheetData.find(r=>norm(r.game)===norm(m.t1+'Vs'+m.t2)) ||
         null;
}

window.onload = async () => {
  // Grab ?sheet= param — URLSearchParams handles all special characters correctly
  const urlParams = new URLSearchParams(window.location.search);
  const sheetParam = urlParams.get('sheet');
  if(sheetParam && sheetParam.startsWith('https://')){
    scriptUrl = sheetParam;
    localStorage.setItem(SU_KEY, scriptUrl);
    // Remove the param from URL bar cleanly
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  // Load PINs (only pre-login fetch)
  if(scriptUrl){
    try{
      const r = await fetch(scriptUrl+'?action=getPins');
      const j = await r.json();
      playerPins = j.pins || j || {};
      console.log('PINs loaded:', Object.keys(playerPins).length);
    }catch(e){ console.log('PIN fetch failed',e); }
  }

  // Restore session
  const saved = sessionStorage.getItem('ipl26_user');
  if(saved){
    try{
      currentUser = JSON.parse(saved);
      showApp();
      return;
    }catch(e){ sessionStorage.removeItem('ipl26_user'); }
  }

  // Show login or config
  if(!scriptUrl){
    document.getElementById('login').style.display='none';
    document.getElementById('cfg').style.display='flex';
    return;
  }

  buildGrid();
};

function saveConfig(){
  const url = document.getElementById('sheet-url').value.trim();
  if(!url.startsWith('https://script.google.com')){ toast('Enter a valid Apps Script URL'); return; }
  scriptUrl = url;
  localStorage.setItem(SU_KEY, url);
  document.getElementById('cfg').style.display='none';
  document.getElementById('login').style.display='flex';
  // Load PINs now
  fetch(scriptUrl+'?action=getPins').then(r=>r.json()).then(j=>{
    playerPins = j.pins||j||{};
    buildGrid();
  }).catch(()=>buildGrid());
}

function numPress(n){
  if(pinEntry.length>=4) return;
  pinEntry += String(n);
  updateDots();
  if(pinEntry.length===4) setTimeout(checkPin,150);
}

function numDel(){
  pinEntry = pinEntry.slice(0,-1);
  updateDots();
  document.getElementById('pin-err').textContent='';
}

function updateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    d.classList.toggle('on', i<pinEntry.length);
  }
}

function checkPin(){
  const adminPin = localStorage.getItem(ADMIN_KEY)||'0000';
  const isAdm    = ADMINS.map(n=>n.toLowerCase()).includes(loginTarget.toLowerCase().trim());

  // Case-insensitive PIN lookup
  const stored = Object.entries(playerPins).reduce((found,[k,v])=>{
    return (!found && k.trim().toLowerCase()===loginTarget.trim().toLowerCase()) ? v : found;
  },'');

  document.getElementById('pin-debug').textContent =
    Object.keys(playerPins).length+' PINs loaded. '+loginTarget+': '+(stored?'✓ found':'✗ not found');

  if(isAdm && (pinEntry===adminPin || (stored && pinEntry===stored))){
    loginOK(loginTarget, true); return;
  }
  if(stored && pinEntry===stored){
    loginOK(loginTarget, false); return;
  }
  // Wrong or missing
  document.getElementById('pin-err').textContent = stored ? 'Wrong PIN — try again' : 'No PIN set — ask PK or Priya';
  pinEntry=''; updateDots();
  shake();
}

function shake(){
  const dots=document.querySelector('.dots');
  if(!dots) return;
  dots.style.transform='translateX(8px)';
  setTimeout(()=>{ dots.style.transform='translateX(-8px)'; setTimeout(()=>{ dots.style.transform=''; },80); },80);
}

function loginOK(name, isAdm){
  currentUser = {name, isAdmin:isAdm};
  sessionStorage.setItem('ipl26_user', JSON.stringify(currentUser));
  showApp();
}

function logout(){
  if(!confirm('Log out as '+currentUser?.name+'?')) return;
  currentUser=null;
  sessionStorage.removeItem('ipl26_user');

}

// ─── SYNC ─────────────────────────────────────────────────────────────────────
async function doSync(){
  const btn=document.getElementById('sync-btn');
  btn.className='sync-btn syncing'; btn.textContent='↻ Syncing';
  try{
    const r=await fetch(scriptUrl+'?action=getData');
    const j=await r.json();
    sheetData=j.data||[];
    // Merge any players found in sheet data
    sheetData.forEach(row=>{
      Object.keys(row.picks||{}).forEach(p=>{ if(p&&!PLAYERS.includes(p)) PLAYERS.push(p); });
    });
    btn.className='sync-btn ok'; btn.textContent='✓ Synced';
    setTimeout(()=>{ btn.className='sync-btn'; btn.textContent='↻ Sync'; },2000);
    drawMatches();
  }catch(e){
    btn.className='sync-btn err'; btn.textContent='! Failed';
    toast('Sync failed');
  }
}

async function push(payload){
  try{
    await fetch(scriptUrl,{method:'POST',body:JSON.stringify(payload)});
    await doSync();
  }catch(e){ toast('Save failed'); }
}

function openPicks(mid){
  curMatchId=mid;
  const m=SCHEDULE.find(x=>x.id===mid);
  const row=getRow(mid);
  const picks=row?.picks||{};
  const t1=teamById(m.t1), t2=teamById(m.t2);
  document.getElementById('pm-title').textContent=`${t1.id} vs ${t2.id}`;
  document.getElementById('pm-sub').textContent=`${m.date} · ${m.venue}`;
  const allP=[...new Set([...PLAYERS,...Object.keys(picks).filter(p=>picks[p])])];
  const myName=currentUser?.name;
  let html='';
  // Editable row(s)
  const editP = isAdmin() ? allP : allP.filter(p=>p===myName);
  if(editP.length){
    if(!isAdmin()) html+=`<div class="section-lbl">Your Pick</div>`;
    html+=editP.map(p=>{
      const cur=picks[p]||'';
      return `<div class="pick-row">
        <div class="pick-name">${p}</div>
        <div class="pick-btns">
          <button class="tbtn${cur===m.t1?' sel':''}" style="${cur===m.t1?'background:'+t1.color:''}" onclick="selPick('${p}','${m.t1}',this,'${t1.color}')">${t1.id}</button>
          <button class="tbtn${cur===m.t2?' sel':''}" style="${cur===m.t2?'background:'+t2.color:''}" onclick="selPick('${p}','${m.t2}',this,'${t2.color}')">${t2.id}</button>
          <button class="tbtn${!cur?' sel':''}" style="${!cur?'background:#64748B':''}" onclick="selPick('${p}','',this,'#64748B')">—</button>
        </div>
      </div>`;
    }).join('');
  }
  // Read-only rows for non-admins
  if(!isAdmin()){
    const roP=allP.filter(p=>p!==myName);
    if(roP.length){
      html+=`<div class="section-lbl">Everyone's Picks</div>`;
      html+=roP.map(p=>{
        const pick=picks[p]||'';
        const t=pick?teamById(pick):null;
        return `<div class="readonly-pick">
          <div class="ro-name">${p}</div>
          ${pick?`<div class="ro-chip" style="background:${t.color}">${pick}</div>`:`<div class="ro-none">No pick yet</div>`}
        </div>`;
      }).join('');
    }
  }
  document.getElementById('pm-body').innerHTML=html||'<div class="empty">No picks yet</div>';
  document.getElementById('picks-modal').classList.add('open');
}

function selPick(player,team,btn,color){
  const row=btn.closest('.pick-row');
  row.querySelectorAll('.tbtn').forEach(b=>{b.classList.remove('sel');b.style.background='';});
  btn.classList.add('sel'); btn.style.background=color;
  btn.dataset.player=player; btn.dataset.team=team;
}

function savePicks(){
  const m=SCHEDULE.find(x=>x.id===curMatchId);
  const picks={};
  document.querySelectorAll('#pm-body .pick-row').forEach(row=>{
    const name=row.querySelector('.pick-name').textContent;
    const sel=row.querySelector('.tbtn.sel');
    const team=sel?sel.dataset.team||'':'';
    if(team) picks[name]=team;
  });
  if(!Object.keys(picks).length){ toast('No picks selected'); return; }
  closeModal('picks-modal');
  toast('Saving...');
  push({action:'setPicks',id:curMatchId,date:m.date,game:`${m.t1} Vs ${m.t2}`,picks});
}

function openWin(mid){
  curMatchId=mid; winChoice=null;
  const m=SCHEDULE.find(x=>x.id===mid);
  const row=getRow(mid);
  const t1=teamById(m.t1), t2=teamById(m.t2);

      ${t.id}

  }).join('');

function selWin(tid,el){
  winChoice=tid;
  document.querySelectorAll('.win-opt').forEach(o=>{o.classList.remove('sel');});
  el.classList.add('sel');
}

async function saveWinner(){
  if(!winChoice){ toast('Pick a winner first'); return; }
  const m=SCHEDULE.find(x=>x.id===curMatchId);
  closeModal('win-modal');
  toast('Fetching latest picks...');
  // Re-fetch to get latest picks before calculating
  try{
    const r=await fetch(scriptUrl+'?action=getData');
    const j=await r.json();
    sheetData=j.data||[];
  }catch(e){}
  const row=getRow(curMatchId);
  const picks=row?.picks||{};
  const pts=getPts(curMatchId);
  const results={};
  PLAYERS.forEach(p=>{
    if(picks[p]) results[p]=picks[p]===winChoice?pts:-pts;
    else results[p]=0;
  });
  toast('Saving result...');
  push({action:'setWinner',id:curMatchId,date:m.date,game:`${m.t1} Vs ${m.t2}`,winner:winChoice,picks,results});
}

      <td style="position:sticky;left:0;background:var(--dark);padding:8px 10px;font-family:var(--fh);font-size:16px;font-weight:700">TOTAL</td>
      ${sortedP.map((p,rank)=>`<td style="text-align:center;padding:6px 3px">
        <div style="font-family:var(--fh);font-size:17px;font-weight:700;color:${totals[p]>0?'var(--green)':totals[p]<0?'var(--red)':'var(--muted)'}">${totals[p]>0?'+':''}${totals[p]}</div>
        ${rank===0?'<div style="font-size:9px">🥇</div>':rank===1?'<div style="font-size:9px">🥈</div>':rank===2?'<div style="font-size:9px">🥉</div>':''}
      </td>`).join('')}
    </tr>
    </tbody>
  </table></div>`;
  el.innerHTML=html;
}

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────
function drawBoard(){
  const el=document.getElementById('tab-board');
  const stats=PLAYERS.map((p,i)=>{
    let total=0,wins=0,played=0;
    sheetData.forEach(row=>{
      if(row.winner&&row.picks?.[p]){
        played++;
        const r=parseFloat(row.results?.[p]||0);
        total+=r; if(r>0) wins++;
      }
    });
    return{name:p,idx:i,total,wins,played};
  }).sort((a,b)=>b.total-a.total);
  const done=sheetData.filter(r=>r.winner).length;
  el.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${done}</div><div class="stat-lbl">Done</div></div>
      <div class="stat-card"><div class="stat-val">${SCHEDULE.length-done}</div><div class="stat-lbl">Remaining</div></div>
    </div>
    ${stats.map((s,rank)=>`
    <div class="lb-item">
      <div class="lb-rank ${rank===0?'g':rank===1?'s':rank===2?'b':''}">${rank+1}</div>
      <div class="lb-av" style="background:${COLORS[s.idx%COLORS.length]}">${av(s.name)}</div>
      <div class="lb-name">${s.name}</div>
      <div class="lb-right">
        <div class="lb-amt ${s.total>0?'pos':s.total<0?'neg':'zero'}">${s.total>0?'+':''}${s.total} pts</div>
        <div class="lb-det">${s.wins}W / ${s.played} played</div>
      </div>
    </div>`).join('')}`;
}

// ─── TEAMS ────────────────────────────────────────────────────────────────────
function toggleTeam(id){
  expandedTeams.has(id)?expandedTeams.delete(id):expandedTeams.add(id);
  drawTeams();
}

function drawTeams(){
  const el=document.getElementById('tab-teams');
  el.innerHTML=TEAMS.map(t=>{
    const open=expandedTeams.has(t.id);
    return `<div class="team-card">
      <div class="team-hdr" onclick="toggleTeam('${t.id}')">
        <div class="team-badge" style="background:${t.color}">${t.id}</div>
        <div class="team-info">
          <div class="team-name">${t.name}</div>
          <div class="team-sub">Tap to ${open?'collapse':'expand'}</div>
        </div>
        <div class="team-chevron${open?' open':''}">›</div>
      </div>
      ${open?`<div class="squad-body"><div class="empty" style="padding:16px">Squad details coming soon</div></div>`:''}
    </div>`;
  }).join('');
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function drawSettings(){
  const el=document.getElementById('tab-settings');
  el.innerHTML=`
    <div class="set-card">
      <div class="set-title">Connected Sheet</div>
      <div style="font-size:11px;color:var(--muted);word-break:break-all;margin-bottom:10px">${scriptUrl||'—'}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-sm btn-pri" onclick="setupHeaders()">Setup Headers</button>
        <button class="btn-sm btn-pri" onclick="recalc()">Recalc Totals</button>
        <button class="btn-sm" onclick="localStorage.removeItem('${SU_KEY}');location.reload()">Disconnect</button>
      </div>
      <div class="set-hint">Run Setup Headers once to add column names to your sheet</div>
    </div>
    <div class="set-card">
      <div class="set-title">Players (${PLAYERS.length})</div>
      <div style="margin-bottom:10px">
        ${PLAYERS.map((p,i)=>`
        <div class="player-row-set">
          <div class="p-av" style="background:${COLORS[i%COLORS.length]}">${av(p)}</div>
          <div style="flex:1;font-size:13px;font-weight:600">${p}</div>
          <span style="font-size:11px;color:${playerPins[p]?'var(--green)':'var(--red)'}">${playerPins[p]?'🔒 PIN set':'No PIN'}</span>
          ${isAdmin()?`<button class="btn-danger" onclick="removePlayer(${i})">✕</button>`:''}
        </div>`).join('')}
      </div>
      ${isAdmin()?`<div style="display:flex;gap:8px">
        <input class="inp" id="np-name" placeholder="Name" style="flex:2">
        <input class="inp" id="np-pin" type="password" inputmode="numeric" maxlength="4" placeholder="PIN" style="flex:1">
        <button class="btn-sm btn-pri" onclick="addPlayer()">+ Add</button>
      </div>
      <div class="set-hint">⚠ Removing a player won't delete past data</div>`:''}
    </div>
    ${isAdmin()?`
    <div class="set-card">
      <div class="set-title">Admin PIN</div>
      <div style="display:flex;gap:8px">
        <input class="inp" id="new-admin-pin" type="password" inputmode="numeric" maxlength="4" placeholder="New admin PIN" style="flex:1">
        <button class="btn-sm btn-pri" onclick="changeAdminPin()">Save</button>
      </div>
      <div class="set-hint">Stored on this device only. Default: 0000</div>
    </div>`:''}`;
}

async function addPlayer(){
  const name=document.getElementById('np-name').value.trim();
  const pin=document.getElementById('np-pin').value.trim();
  if(!name){ toast('Enter a name'); return; }
  if(!pin||pin.length!==4){ toast('Enter a 4-digit PIN'); return; }
  if(PLAYERS.map(p=>p.toLowerCase()).includes(name.toLowerCase())){ toast('Already exists'); return; }
  PLAYERS.push(name); savePlayers();
  document.getElementById('np-name').value='';
  document.getElementById('np-pin').value='';
  // Save PIN to sheet
  try{
    await fetch(scriptUrl,{method:'POST',body:JSON.stringify({action:'setPin',player:name,pin})});
    playerPins[name]=pin;
    await fetch(scriptUrl,{method:'POST',body:JSON.stringify({action:'setupHeaders',players:PLAYERS})});
    toast(name+' added!');
  }catch(e){ toast(name+' added (PIN save failed)'); }
  drawSettings();
}

function removePlayer(idx){
  const name=PLAYERS[idx];
  if(!confirm('Remove '+name+'?')) return;
  PLAYERS.splice(idx,1); savePlayers();
  toast(name+' removed');
  drawSettings();
}

function changeAdminPin(){
  const v=document.getElementById('new-admin-pin').value.trim();
  if(!/^\d{4}$/.test(v)){ toast('Must be 4 digits'); return; }
  localStorage.setItem(ADMIN_KEY,v);
  document.getElementById('new-admin-pin').value='';
  toast('Admin PIN updated!');
}

async function setupHeaders(){
  toast('Setting up headers...');
  try{
    const r=await fetch(scriptUrl+'?action=setupHeaders');
    const j=await r.json();
    toast(j.ok?'✓ Headers set!':'Error: '+(j.error||'unknown'));
  }catch(e){ toast('Failed'); }
}

async function recalc(){
  toast('Recalculating...');
  try{
    await fetch(scriptUrl,{method:'POST',body:JSON.stringify({action:'updateTotals'})});
    toast('✓ Totals updated!');
  }catch(e){ toast('Failed'); }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{ if(e.target===bg) bg.classList.remove('open'); }));
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
